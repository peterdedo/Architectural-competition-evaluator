<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analýza Urbanistických Projektů - Vision AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; background: white; }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; opacity: 0.9; }
        .main-content { display: flex; }
        .sidebar {
            width: 280px; background: #2c3e50; color: white;
            min-height: calc(100vh - 140px);
        }
        .nav-item {
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 15px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: #667eea; border-left: 4px solid white; }
        .content-area { flex: 1; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }
        .btn {
            padding: 12px 30px; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s; margin-right: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; margin-bottom: 8px;
            color: #2c3e50; font-weight: 600;
        }
        input, select {
            width: 100%; padding: 12px 15px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 1rem; transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none; border-color: #667eea;
        }
        .info-box {
            padding: 15px; background: #e7f3ff;
            border-left: 4px solid #2196F3;
            border-radius: 8px; margin-bottom: 20px;
        }
        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 15px 25px; background: #333; color: white;
            border-radius: 8px; z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏙️ Analýza Urbanistických Projektů</h1>
            <p class="subtitle">Vision AI - Bez hallucinací!</p>
        </header>
        <div class="main-content">
            <div class="sidebar">
                <div class="nav-item active" onclick="showSection('config')">
                    <div>1. Konfigurace API</div>
                </div>
                <div class="nav-item" onclick="showSection('upload')">
                    <div>2. Nahrání Dokumentů</div>
                </div>
                <div class="nav-item" onclick="showSection('results')">
                    <div>3. Výsledky</div>
                </div>
            </div>
            <div class="content-area">
                <div class="section active" id="section-config">
                    <h2>⚙️ Konfigurace API</h2>
                    <div class="info-box">
                        <strong>💡 Vision AI:</strong> Aplikace používá GPT-4 Vision, který vidí PDF jako obrázky - stejně jako ChatGPT UI. Díky tomu nemůže hallucinate!
                    </div>
                    <div class="form-group">
                        <label>OpenAI API Klíč:</label>
                        <input type="password" id="apiKey" placeholder="sk-proj-...">
                    </div>
                    <div class="form-group">
                        <label>Model:</label>
                        <select id="gptModel">
                            <option value="gpt-4-turbo" selected>GPT-4 Turbo (Vision)</option>
                            <option value="gpt-4o">GPT-4o (Vision)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="saveConfig()">💾 Uložit</button>
                </div>
                <div class="section" id="section-upload">
                    <h2>📄 Nahrání PDF</h2>
                    <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(this.files[0])">
                    <div id="fileInfo"></div>
                    <button class="btn btn-primary" onclick="analyze()" id="analyzeBtn" disabled>🚀 Analyzovat</button>
                </div>
                <div class="section" id="section-results">
                    <h2>📊 Výsledky</h2>
                    <div id="resultsContainer"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let apiKey = '', gptModel = 'gpt-4-turbo', pdfFile = null, pageImages = [];
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`section-${id}`).classList.add('active');
            event.target.closest('.nav-item').classList.add('active');
        }
        
        function saveConfig() {
            apiKey = document.getElementById('apiKey').value.trim();
            gptModel = document.getElementById('gptModel').value;
            if (!apiKey) return showToast('Zadejte API klíč', 'error');
            localStorage.setItem('openai_api_key', apiKey);
            localStorage.setItem('gpt_model', gptModel);
            showToast('Uloženo!', 'success');
            setTimeout(() => showSection('upload'), 500);
        }
        
        async function handleFile(file) {
            if (!file) return;
            pdfFile = file;
            document.getElementById('fileInfo').innerHTML = `<p>📄 ${file.name}</p>`;
            
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            pageImages = [];
            
            for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                pageImages.push(canvas.toDataURL('image/png').split(',')[1]);
            }
            
            document.getElementById('analyzeBtn').disabled = false;
            showToast(`Připraveno ${pageImages.length} stránek`, 'success');
        }
        
        async function analyze() {
            if (!apiKey) return showToast('Nastavte API klíč', 'error');
            
            const messages = [{
                role: 'user',
                content: [
                    { type: 'text', text: 'Extrahuj z dokumentu: celková plocha (m²), zastavěná plocha (m²), zelená plocha (m²), náklady (Kč). Vrať JSON: {"celkova_plocha": number, "zastavena_plocha": number, "zelena_plocha": number, "naklady": number}' },
                    ...pageImages.map(img => ({ type: 'image_url', image_url: { url: `data:image/png;base64,${img}` }}))
                ]
            }];
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: gptModel,
                        messages: messages,
                        max_tokens: 1000,
                        temperature: 0
                    })
                });
                
                if (!response.ok) throw new Error(response.statusText);
                
                const data = await response.json();
                const content = data.choices[0].message.content;
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                
                if (jsonMatch) {
                    const results = JSON.parse(jsonMatch[0]);
                    displayResults(results);
                    showSection('results');
                }
            } catch (error) {
                showToast('Chyba: ' + error.message, 'error');
            }
        }
        
        function displayResults(results) {
            const html = `
                <table style="width:100%; border-collapse: collapse;">
                    <tr><th style="padding:10px; background:#667eea; color:white;">Kritérium</th><th style="padding:10px; background:#667eea; color:white;">Hodnota</th></tr>
                    <tr><td style="padding:10px; border:1px solid #ddd;">Celková plocha</td><td style="padding:10px; border:1px solid #ddd;">${results.celkova_plocha || '-'} m²</td></tr>
                    <tr><td style="padding:10px; border:1px solid #ddd;">Zastavěná plocha</td><td style="padding:10px; border:1px solid #ddd;">${results.zastavena_plocha || '-'} m²</td></tr>
                    <tr><td style="padding:10px; border:1px solid #ddd;">Zelená plocha</td><td style="padding:10px; border:1px solid #ddd;">${results.zelena_plocha || '-'} m²</td></tr>
                    <tr><td style="padding:10px; border:1px solid #ddd;">Náklady</td><td style="padding:10px; border:1px solid #ddd;">${results.naklady || '-'} Kč</td></tr>
                </table>
            `;
            document.getElementById('resultsContainer').innerHTML = html;
        }
        
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('openai_api_key');
            const savedModel = localStorage.getItem('gpt_model');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
                apiKey = savedKey;
            }
            if (savedModel) {
                document.getElementById('gptModel').value = savedModel;
                gptModel = savedModel;
            }
        });
    </script>
</body>
</html>
